# This workflow installs dependencies, runs static checks, and tests on supported Python.

name: Python package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - rc-**

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -e ".[dev]"
    - name: Run basedpyright on src
      run: |
        python3 -m basedpyright src
    - name: Run ruff lint
      run: |
        python3 -m ruff check .
    - name: Check code formatting with black
      run: |
        python3 -m black --check src tests examples benchmark
    - name: Run tests
      run: |
        python3 -m pytest tests/ -v -m "not requires_testnet"
